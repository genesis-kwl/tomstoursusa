<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototype Review — Tom's Tours USA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0F1117;
      --surface: #1A1D27;
      --surface-2: #242734;
      --border: #2E3140;
      --text: #E4E4E7;
      --text-2: #9EA0AB;
      --accent: #3B82F6;
      --accent-hover: #2563EB;
      --green: #22C55E;
      --gold: #F59E0B;
      --red: #EF4444;
      --radius: 8px;
      --font: "Inter", -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); }

    /* ── TOP BAR ── */
    .topbar {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
    .topbar-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .topbar-meta { font-size: 12px; color: var(--text-2); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-badge {
      font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px;
      background: rgba(59,130,246,0.15); color: var(--accent);
    }
    .progress-bar {
      width: 120px; height: 4px; background: var(--surface-2); border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s;
    }
    .progress-text { font-size: 11px; color: var(--text-2); min-width: 32px; text-align: right; }

    /* ── MAIN LAYOUT ── */
    .main { display: flex; height: calc(100vh - 52px); }

    /* Left: Preview */
    .preview-panel {
      flex: 1;
      border-right: 1px solid var(--border);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .preview-toolbar {
      height: 36px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 12px; gap: 8px; flex-shrink: 0;
    }
    .preview-toolbar span { font-size: 11px; color: var(--text-2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .device-btn {
      font-size: 11px; padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border);
      background: transparent; color: var(--text-2); cursor: pointer; transition: all 0.15s;
    }
    .device-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .device-btn:hover:not(.active) { border-color: var(--text-2); color: var(--text); }
    .preview-frame-wrap {
      flex: 1; display: flex; align-items: flex-start; justify-content: center;
      overflow: hidden; background: #1a1a1a; padding: 0;
    }
    .preview-frame-wrap iframe {
      width: 100%; height: 100%; border: none; background: #fff;
      transition: max-width 0.3s;
    }
    .preview-frame-wrap.mobile iframe { max-width: 375px; }
    .preview-frame-wrap.tablet iframe { max-width: 768px; }
    .preview-frame-wrap.desktop iframe { max-width: 100%; }

    /* Section indicators on left side */
    .section-markers {
      position: absolute; top: 36px; left: 0; bottom: 0; width: 4px; z-index: 10;
    }

    /* Right: Review panel */
    .review-panel {
      width: 420px; display: flex; flex-direction: column; background: var(--bg);
      flex-shrink: 0;
    }
    .review-toolbar {
      height: 36px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 12px; flex-shrink: 0;
    }
    .review-toolbar span { font-size: 11px; color: var(--text-2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .review-scroll {
      flex: 1; overflow-y: auto; padding: 16px;
      scrollbar-width: thin; scrollbar-color: var(--surface-2) transparent;
    }
    .review-scroll::-webkit-scrollbar { width: 6px; }
    .review-scroll::-webkit-scrollbar-track { background: transparent; }
    .review-scroll::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 3px; }

    /* Section review blocks */
    .section-review {
      margin-bottom: 16px; border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; transition: border-color 0.2s;
    }
    .section-review:hover { border-color: rgba(59,130,246,0.3); }
    .section-review.active { border-color: var(--accent); }
    .section-review.has-feedback { border-color: var(--gold); }
    .section-review.approved { border-color: var(--green); }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; background: var(--surface); cursor: pointer;
      user-select: none;
    }
    .section-header-left { display: flex; align-items: center; gap: 10px; }
    .section-num {
      width: 24px; height: 24px; border-radius: 6px; background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--text-2);
    }
    .section-review.approved .section-num { background: rgba(34,197,94,0.15); color: var(--green); }
    .section-review.has-feedback .section-num { background: rgba(245,158,11,0.15); color: var(--gold); }
    .section-name { font-size: 13px; font-weight: 600; }
    .section-tag {
      font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .section-tag.pending { background: var(--surface-2); color: var(--text-2); }
    .section-tag.feedback { background: rgba(245,158,11,0.15); color: var(--gold); }
    .section-tag.approved { background: rgba(34,197,94,0.15); color: var(--green); }

    .section-body { padding: 14px; display: none; }
    .section-review.open .section-body { display: block; }

    .section-body label {
      display: block; font-size: 11px; font-weight: 600; color: var(--text-2);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
    }
    .section-body textarea {
      width: 100%; min-height: 80px; padding: 10px 12px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface-2); color: var(--text);
      font-family: var(--font); font-size: 13px; line-height: 1.5; resize: vertical;
      transition: border-color 0.15s;
    }
    .section-body textarea:focus { outline: none; border-color: var(--accent); }
    .section-body textarea::placeholder { color: var(--text-2); }

    .section-actions {
      display: flex; gap: 8px; margin-top: 10px;
    }
    .action-btn {
      flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text-2); font-family: var(--font);
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .action-btn:hover { border-color: var(--text-2); color: var(--text); }
    .action-btn.approve { border-color: rgba(34,197,94,0.3); color: var(--green); }
    .action-btn.approve:hover { background: rgba(34,197,94,0.1); }
    .action-btn.approve.selected { background: rgba(34,197,94,0.15); border-color: var(--green); }
    .action-btn.revise { border-color: rgba(245,158,11,0.3); color: var(--gold); }
    .action-btn.revise:hover { background: rgba(245,158,11,0.1); }
    .action-btn.revise.selected { background: rgba(245,158,11,0.15); border-color: var(--gold); }

    /* Overall feedback */
    .overall-section {
      margin-top: 8px; border: 2px solid var(--border); border-radius: var(--radius);
      overflow: hidden;
    }
    .overall-header {
      padding: 14px; background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .overall-header h3 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .overall-header p { font-size: 12px; color: var(--text-2); }
    .overall-body { padding: 14px; }
    .overall-body textarea {
      width: 100%; min-height: 120px; padding: 12px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface-2); color: var(--text);
      font-family: var(--font); font-size: 13px; line-height: 1.5; resize: vertical;
      margin-bottom: 12px;
    }
    .overall-body textarea:focus { outline: none; border-color: var(--accent); }
    .overall-body textarea::placeholder { color: var(--text-2); }

    .verdict-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .verdict-btn {
      flex: 1; padding: 10px; border-radius: 6px; border: 2px solid var(--border);
      background: transparent; font-family: var(--font); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .verdict-btn.v-approve { color: var(--green); border-color: rgba(34,197,94,0.3); }
    .verdict-btn.v-approve:hover, .verdict-btn.v-approve.selected { background: rgba(34,197,94,0.1); border-color: var(--green); }
    .verdict-btn.v-revise { color: var(--gold); border-color: rgba(245,158,11,0.3); }
    .verdict-btn.v-revise:hover, .verdict-btn.v-revise.selected { background: rgba(245,158,11,0.1); border-color: var(--gold); }
    .verdict-btn.v-reject { color: var(--red); border-color: rgba(239,68,68,0.3); }
    .verdict-btn.v-reject:hover, .verdict-btn.v-reject.selected { background: rgba(239,68,68,0.1); border-color: var(--red); }

    .submit-btn {
      width: 100%; padding: 14px; border-radius: 8px; border: none;
      background: var(--accent); color: #fff; font-family: var(--font);
      font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s;
    }
    .submit-btn:hover { background: var(--accent-hover); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Toast notification */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--green); color: #fff; padding: 12px 24px; border-radius: 8px;
      font-size: 14px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      display: none; z-index: 9999;
    }
    .toast.show { display: block; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-dot"></div>
      <span class="topbar-title">Prototype Review</span>
      <span class="topbar-meta">Tom's Tours USA &mdash; Korean Website v1</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-badge">REVIEW SESSION</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-text" id="progressText">0/7</span>
    </div>
  </div>

  <!-- Main layout -->
  <div class="main">
    <!-- Left: Preview -->
    <div class="preview-panel">
      <div class="preview-toolbar">
        <span>Preview</span>
        <div style="flex:1"></div>
        <button class="device-btn" data-device="mobile">Mobile</button>
        <button class="device-btn" data-device="tablet">Tablet</button>
        <button class="device-btn active" data-device="desktop">Desktop</button>
      </div>
      <div class="preview-frame-wrap desktop" id="frameWrap">
        <iframe src="index.html" id="previewFrame" title="Website preview"></iframe>
      </div>
    </div>

    <!-- Right: Review -->
    <div class="review-panel">
      <div class="review-toolbar">
        <span>Section Feedback</span>
      </div>
      <div class="review-scroll" id="reviewScroll">

        <!-- Section reviews generated by JS -->
        <div id="sectionReviews"></div>

        <!-- Overall -->
        <div class="overall-section">
          <div class="overall-header">
            <h3>Overall Feedback</h3>
            <p>General notes, direction changes, or sign-off comments.</p>
          </div>
          <div class="overall-body">
            <textarea id="overallFeedback" placeholder="Overall thoughts on the prototype..."></textarea>
            <div class="verdict-row">
              <button class="verdict-btn v-approve" data-verdict="approve" onclick="setVerdict(this)">Approve</button>
              <button class="verdict-btn v-revise" data-verdict="revise" onclick="setVerdict(this)">Revise</button>
              <button class="verdict-btn v-reject" data-verdict="reject" onclick="setVerdict(this)">Reject</button>
            </div>
            <button class="submit-btn" id="submitBtn" onclick="submitReview()">Submit Review</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="toast" id="toast">Review submitted successfully!</div>

  <script>
    // Section definitions matching the website
    const SECTIONS = [
      { id: 'home',    name: 'Hero',           anchor: '#home',    hint: 'Headline, background photo, CTA, YouTube embed' },
      { id: 'about',   name: 'About Tom',      anchor: '#about',   hint: 'Bio text, photos, stats, testimonial' },
      { id: 'tours',   name: 'Tour Routes',    anchor: '#tours',   hint: '7 tour cards, photos, descriptions, distances' },
      { id: 'gallery', name: 'Gallery',        anchor: '#gallery', hint: '9 photos, captions, lightbox' },
      { id: 'videos',  name: 'Videos',         anchor: '#videos',  hint: '3 YouTube embeds' },
      { id: 'contact', name: 'Contact',        anchor: '#contact', hint: 'KakaoTalk, phone, email, address' },
      { id: 'footer',  name: 'Footer',         anchor: '',         hint: 'Copyright, nav links' },
    ];

    let sectionStates = {};
    let currentVerdict = null;

    // Build section review blocks
    function buildSections() {
      const container = document.getElementById('sectionReviews');
      SECTIONS.forEach((s, i) => {
        sectionStates[s.id] = { status: 'pending', feedback: '' };
        container.innerHTML += `
          <div class="section-review" id="review-${s.id}" data-section="${s.id}">
            <div class="section-header" onclick="toggleSection('${s.id}')">
              <div class="section-header-left">
                <div class="section-num">${i + 1}</div>
                <span class="section-name">${s.name}</span>
              </div>
              <span class="section-tag pending" id="tag-${s.id}">Pending</span>
            </div>
            <div class="section-body">
              <label>${s.hint}</label>
              <textarea
                id="feedback-${s.id}"
                placeholder="Feedback for ${s.name}..."
                oninput="onFeedbackInput('${s.id}')"
              ></textarea>
              <div class="section-actions">
                <button class="action-btn approve" id="btn-approve-${s.id}" onclick="setSectionStatus('${s.id}','approved')">Approve</button>
                <button class="action-btn revise" id="btn-revise-${s.id}" onclick="setSectionStatus('${s.id}','revise')">Needs Revision</button>
              </div>
            </div>
          </div>
        `;
      });
    }

    function toggleSection(id) {
      const el = document.getElementById('review-' + id);
      const wasOpen = el.classList.contains('open');
      // Close all
      document.querySelectorAll('.section-review').forEach(r => r.classList.remove('open', 'active'));
      if (!wasOpen) {
        el.classList.add('open', 'active');
        // Scroll preview to that section
        scrollPreviewTo(id);
      }
    }

    function scrollPreviewTo(id) {
      const section = SECTIONS.find(s => s.id === id);
      if (!section || !section.anchor) return;
      try {
        const frame = document.getElementById('previewFrame');
        const target = frame.contentDocument.querySelector(section.anchor);
        if (target) target.scrollIntoView({ behavior: 'smooth' });
      } catch(e) {}
    }

    function onFeedbackInput(id) {
      const val = document.getElementById('feedback-' + id).value.trim();
      sectionStates[id].feedback = val;
      if (val && sectionStates[id].status === 'pending') {
        updateSectionUI(id, 'has-feedback');
      }
    }

    function setSectionStatus(id, status) {
      sectionStates[id].status = status;
      const el = document.getElementById('review-' + id);
      const tag = document.getElementById('tag-' + id);
      const approveBtn = document.getElementById('btn-approve-' + id);
      const reviseBtn = document.getElementById('btn-revise-' + id);

      el.classList.remove('has-feedback', 'approved');
      approveBtn.classList.remove('selected');
      reviseBtn.classList.remove('selected');

      if (status === 'approved') {
        el.classList.add('approved');
        tag.className = 'section-tag approved';
        tag.textContent = 'Approved';
        approveBtn.classList.add('selected');
      } else {
        el.classList.add('has-feedback');
        tag.className = 'section-tag feedback';
        tag.textContent = 'Revision';
        reviseBtn.classList.add('selected');
      }
      updateProgress();
    }

    function updateSectionUI(id, cls) {
      const el = document.getElementById('review-' + id);
      const tag = document.getElementById('tag-' + id);
      if (cls === 'has-feedback' && sectionStates[id].status === 'pending') {
        tag.className = 'section-tag feedback';
        tag.textContent = 'Draft';
      }
    }

    function updateProgress() {
      const reviewed = SECTIONS.filter(s => sectionStates[s.id].status !== 'pending').length;
      const pct = Math.round((reviewed / SECTIONS.length) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent = reviewed + '/' + SECTIONS.length;
    }

    function setVerdict(btn) {
      document.querySelectorAll('.verdict-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      currentVerdict = btn.dataset.verdict;
    }

    function submitReview() {
      const review = {
        project: 'toms_tours_usa',
        prototype: 'korean_website_v1',
        timestamp: new Date().toISOString(),
        verdict: currentVerdict,
        overall_feedback: document.getElementById('overallFeedback').value.trim(),
        sections: {}
      };

      SECTIONS.forEach(s => {
        review.sections[s.id] = {
          name: s.name,
          status: sectionStates[s.id].status,
          feedback: document.getElementById('feedback-' + s.id).value.trim()
        };
      });

      // Save as downloadable JSON
      const blob = new Blob([JSON.stringify(review, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'prototype_review_' + new Date().toISOString().slice(0,10) + '.json';
      a.click();
      URL.revokeObjectURL(url);

      // Show toast
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);

      console.log('Review submitted:', JSON.stringify(review, null, 2));
    }

    // Device switcher
    document.querySelectorAll('.device-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const wrap = document.getElementById('frameWrap');
        wrap.className = 'preview-frame-wrap ' + this.dataset.device;
      });
    });

    // Sync: when preview scrolls, highlight the active section in review panel
    function setupScrollSync() {
      try {
        const frame = document.getElementById('previewFrame');
        frame.addEventListener('load', () => {
          const doc = frame.contentDocument || frame.contentWindow.document;
          doc.addEventListener('scroll', () => {
            const scrollY = doc.documentElement.scrollTop || doc.body.scrollTop;
            let activeId = SECTIONS[0].id;
            SECTIONS.forEach(s => {
              if (!s.anchor) return;
              const el = doc.querySelector(s.anchor);
              if (el && el.offsetTop <= scrollY + 200) activeId = s.id;
            });
            // Highlight active section in review panel
            document.querySelectorAll('.section-review').forEach(r => r.classList.remove('active'));
            const activeEl = document.getElementById('review-' + activeId);
            if (activeEl) activeEl.classList.add('active');
          });
        });
      } catch(e) {}
    }

    // Init
    buildSections();
    setupScrollSync();
    // Auto-open first section
    setTimeout(() => toggleSection('home'), 300);
  </script>
</body>
</html>
